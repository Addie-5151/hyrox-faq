const state = {
    expanded: new Set(),
    keyword: ""
};

function init() {
    document.getElementById("app").innerHTML = `
        <h1 class="text-3xl font-bold mb-4">HYROX FAQ</h1>
        <input id="search" class="w-full p-3 border rounded mb-6" placeholder="搜索问题..." />
        <div id="faq"></div>
    `;

    document.getElementById("search").addEventListener("input", e => {
        state.keyword = e.target.value.toLowerCase();
        render();
    });

    document.addEventListener("click", e => {
        const btn = e.target.closest("[data-id]");
        if (!btn) return;

        const id = btn.dataset.id;
        if (state.expanded.has(id)) state.expanded.delete(id);
        else state.expanded.add(id);

        render();
    });

    render();
}

function render() {
    const box = document.getElementById("faq");
    const kw = state.keyword;

    const filtered = faqData.categories.map(c => ({
        ...c,
        items: c.items.filter(i =>
            i.question.toLowerCase().includes(kw) ||
            i.answer.toLowerCase().includes(kw)
        )
    })).filter(c => c.items.length);

    box.innerHTML = filtered.map(c => `
        <div class="mb-6">
            <h2 class="text-xl font-bold mb-3">${c.name}</h2>

            ${c.items.map((i, idx) => {
                const id = c.id + "-" + idx;
                const open = state.expanded.has(id);

                return `
                    <div class="border rounded mb-2 bg-white">
                        <button class="w-full text-left p-3 flex justify-between" data-id="${id}">
                            <span>${i.question}</span>
                            <span>${open ? "▲" : "▼"}</span>
                        </button>

                        ${open ? `
                            <div class="p-3 border-t text-gray-600">
                                ${i.answer}
                            </div>
                        ` : ""}
                    </div>
                `;
            }).join("")}
        </div>
    `).join("");
}

init();
